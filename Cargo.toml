[package]
name = "beve"
version = "0.1.2"
edition = "2021"
description = "Rust implementation of the BEVE (Binary Efficient Versatile Encoding) specification with serde support"
license = "MIT OR Apache-2.0"
repository = "https://github.com/beve-org/beve-rs"
homepage = "https://github.com/beve-org/beve-rs"
readme = "README.md"

[dependencies]
serde = { version = "1", features = ["derive"] }
half = { version = "2.4", features = ["serde"] }
simdutf8 = "0.1"

[dev-dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
criterion = "0.5"
proptest = "1.4"

[[bench]]
name = "serialization"
harness = false
